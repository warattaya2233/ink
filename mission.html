<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNI QUEST CARD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050B17;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    position:relative;
}

/* Grid Background */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(61,187,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,187,255,.08) 1px, transparent 1px);
    background-size:30px 30px;
    z-index:0;
}

/* Glow */
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    background:radial-gradient(circle,
        rgba(61,187,255,.15) 0%,
        transparent 70%);
    z-index:0;
}

img{
    position:relative;
    z-index:1;
    max-width:92%;
    max-height:92vh;
    object-fit:contain;
    border:2px solid #3DBBFF;
    border-radius:12px;
    box-shadow:
        0 0 15px rgba(61,187,255,.7),
        0 0 35px rgba(61,187,255,.4);
}

</style>

</head>

<body>

<img src="kni-quest-card.jpg" alt="KNI QUEST CARD">

</body>
</html>
