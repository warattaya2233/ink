<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNI ACCESS SYSTEM</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:#000;
color:#00ff88;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,255,136,.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,136,.08) 1px, transparent 1px);
background-size:30px 30px;
}

.box{
width:380px;
border:1px solid #00ff88;
padding:25px;
background:rgba(0,0,0,.9);
box-shadow:0 0 20px #00ff88;
z-index:1;
}

.title{
text-align:center;
margin-bottom:20px;
font-size:24px;
}

.status{
margin-bottom:20px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#000;
border:1px solid #00ff88;
color:#00ff88;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#00ff88;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.8;
}

#error{
color:red;
margin-top:10px;
text-align:center;
}

.scan{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}

</style></head><body><div class="box"><div class="title">
KNI ACCESS SYSTEM
</div><div class="status scan">
STATUS : WAITING AUTHENTICATION...
</div><input type="text" id="hint" placeholder="ENTER HINT CODE"><input type="text" id="name" placeholder="ENTER SENIOR NAME"><button onclick="verify()">
VERIFY ACCESS
</button><div id="error"></div></div><script>

function verify(){

let hint =
document.getElementById("hint").value.trim().toUpperCase();

let name =
document.getElementById("name").value.trim().toUpperCase();

if(hint==="KNI" && name==="INK"){

window.location.href="mission.html";

}else{

document.getElementById("error").innerHTML=
"ERROR 404 : ACCESS DENIED";

}

}

</script></body>
</html>
